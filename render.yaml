# Render blueprint. Create the services from this file, then set the secret
# env vars (marked sync:false) in the Render dashboard.
databases:
  - name: restocked-db
    plan: free

services:
  - type: web
    name: restocked
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase: { name: restocked-db, property: connectionString }
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false

  - type: cron
    name: restocked-refresh
    runtime: python
    schedule: "0 5 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.refresh_all
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase: { name: restocked-db, property: connectionString }
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: APP_URL
        sync: false

  - type: cron
    name: restocked-digest
    runtime: python
    schedule: "0 13 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.send_digests
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase: { name: restocked-db, property: connectionString }
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
